<!doctype html>
<html lang="en">
  <head>
    <title>Pengaturan pada link</title>
    <style type="text/css">
      /* Status normal link */
      a:link {
        text-decoration: none;
        background-color: #ff9933;
        color: #ffffff;
      }

      /* Status saat link diklik (aktif) */
      a:active {
        text-decoration: none;
        color: #660000;
      }

      /* Status setelah link pernah dikunjungi */
      a:visited {
        text-decoration: none;
        color: #222;
      }

      /* Status saat kursor mouse berada di atas link */
      a:hover {
        font-weight: bold;
        text-transform: uppercase;
        text-decoration: underline overline;
        color: #000000;
        background-color: #ccff00;
      }
    </style>
  </head>

  <body>
    <table border="0">
      <tr>
        <td><a href="#">Arahkan mouse ke sini</a></td>
      </tr>
      <tr>
        <td><a href="#">Arahkan mouse ke sini</a></td>
      </tr>
    </table>
  </body>
</html>

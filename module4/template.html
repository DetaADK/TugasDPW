<!doctype html>
<html>
  <head>
    <title>Studi Kasus - Antarmuka Web</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }

      /* Bagian Header (Halo CSS!) */
      .header {
        background-color: blue;
        color: white;
        padding: 20px;
        margin-bottom: 10px;
      }
      .header h1 {
        margin: 0;
        font-size: 28pt;
      }
      .header p {
        margin: 5px 0 0 0;
      }

      /* Container untuk Sidebar dan Konten Utama */
      .main-container {
        display: flex; /* Mengatur tata letak agar berdampingan */
        gap: 20px;
        margin-bottom: 10px;
      }

      /* Bagian Menu (Sidebar) */
      .sidebar {
        border: 2px dashed #4682b4; /* Border putus-putus sesuai gambar */
        padding: 15px;
        width: 200px;
        min-height: 300px;
      }
      .sidebar a {
        display: block;
        text-decoration: none;
        color: #333;
        padding: 5px 0;
        font-size: 14pt;
      }
      /* Style Link Hover sesuai materi nomor 6 */
      .sidebar a:hover {
        font-weight: bold;
        text-decoration: underline;
      }

      /* Bagian Konten Utama (Logo & Teks) */
      .content {
        flex-grow: 1;
        text-align: center;
        padding-top: 20px;
      }
      .content img {
        width: 120px;
      }
      .content h2 {
        margin: 10px 0 5px 0;
      }
      .content .motto {
        color: #a52a2a; /* Warna merah marun/coklat */
        font-size: 11pt;
        margin-top: 15px;
        line-height: 1.4;
      }

      /* Bagian Footer */
      .footer {
        background-color: #b0c4de; /* LightSteelBlue */
        padding: 10px;
        text-align: right;
        font-size: 10pt;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Halo CSS !</h1>
      <p>Ini adalah website CSS saya</p>
    </div>

    <div class="main-container">
      <div class="sidebar">
        <a href="#">Menu 1</a>
        <a href="#">Menu 2</a>
        <a href="#">Menu 3</a>
        <a href="#">Menu 4</a>
        <a href="#">Menu 5</a>
        <a href="#">Menu 6</a>
      </div>

      <div class="content">
        <img src="logo.png" alt="Logo PNM" />
        <h2>TI</h2>
        <h3>Politeknik Negeri Madiun</h3>
        <div class="motto">
          Mewujudkan pendidikan tinggi vokasi dalam bidang<br />
          Teknologi Informasi dan penerapannya yang berkualitas,<br />
          inovatif dan berdaya saing Nasional.
        </div>
      </div>
    </div>

    <div class="footer">Nama Anda | NPM | TI-XX</div>
  </body>
</html>

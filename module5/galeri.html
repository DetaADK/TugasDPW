<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Galeri Foto Flexbox</title>
    <style>
      .galeri_wadah {
        display: flex;
        flex-wrap: wrap; /* Skenario 4: Agar foto pindah ke baris baru */
        justify-content: center; /* Skenario 6: Posisi di tengah */
        gap: 10px; /* Jarak antar foto */
        padding: 20px;
        background-color: #f0f0f0;
      }

      .foto_item {
        /* (z) ganti dengan angka terakhir NRP Anda, contoh: 150px */
        width: 150px;
        height: 150px;
        border: 2px solid #333; /* Menggunakan Box Model: Border */
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <h2 style="text-align: center">Gallery Foto (18 Item)</h2>
    <div class="galeri_wadah">
      <img src="gambar/pnm.png" class="foto_item" />
      <img src="gambar/pnj.jpeg" class="foto_item" />
      <img src="gambar/polban.jpeg" class="foto_item" />
      <img src="gambar/polinema.png" class="foto_item" />
      <img src="gambar/ui.png" class="foto_item" />
      <img src="gambar/ugm.jpeg" class="foto_item" />
      <img src="gambar/itb.png" class="foto_item" />
      <img src="gambar/ub.png" class="foto_item" />
      <img src="gambar/unpad.jpeg" class="foto_item" />
      <img src="gambar/upi.png" class="foto_item" />
      <img src="gambar/undip.png" class="foto_item" />
      <img src="gambar/unair.png" class="foto_item" />
      <img src="gambar/unesa.png" class="foto_item" />
      <img src="gambar/uns.jpg" class="foto_item" />
      <img src="gambar/uny.png" class="foto_item" />
      <img src="gambar/um.jpg" class="foto_item" />
      <img src="gambar/its.png" class="foto_item" />
      <img src="gambar/pens.png" class="foto_item" />
    </div>
  </body>
</html>
